
theme = "Paper"
theme-dark = "Nord"
# window-layout = "tabs-top" (reset to default)
foreground = "#1a1a1a"
background = "#fcfbf9"
palette-0 = "#1a1a1a"
palette-1 = "#a33a3a"
palette-2 = "#2b5a38"
palette-3 = "#a85a20"
palette-4 = "#4a7a8a"
palette-5 = "#4a3a6a"
palette-6 = "#3a7a6a"
palette-7 = "#c1beb5"
palette-8 = "#8c8a80"
palette-9 = "#c36a6a"
palette-10 = "#6b9a78"
palette-11 = "#c88a50"
palette-12 = "#7a9aaa"
palette-13 = "#8a7a9a"
palette-14 = "#6abaaa"
palette-15 = "#ebebe6"

# quit-after-last-window-closed = true (reset to default)

# privilege-notification-on-finish = true (reset to default)

copy-on-select = true
clipboard-trim-trailing-spaces = true
editor-visible-whitespace = true

# selection-background = "#edc4be" (reset to default)
# cursor-color = "#cc8595" (reset to default)

# selection-foreground = "#2a2422" (reset to default)
# cursor-text = "#f5f0f0" (reset to default)

# font-family = "MonoLisa Nerd Font Regular"
# font-family-bold = "MonoLisa Nerd Font Bold"
# font-family-italic = "MonoLisa Nerd Font Italic"
# font-family-bold-italic = "MonoLisa Nerd Font Bold Italic"
font-size = 16

macos-option-as-alt = true
privilege-sound-on-error = true
